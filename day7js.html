<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <h1>day8 </h1>


<input type="number" id="fno" >
<input type="number" id="sno" >
<!-- <input type="number" id="res" readonly> -->

<label id="res">0</label>




<button onclick="add()">+</button>
<button onclick="sub()">-</button>
    


    <script>





        function add(){

            let a = document.getElementById("fno").value;
            let b = document.getElementById("sno").value;
            let c = parseInt(a) + parseInt(b);
            // document.getElementById("res").value = c;  // use for result in  input field
            document.getElementById("res").innerHTML = c; // use for result in  lable
        }

        
        function sub(){
             let a = document.getElementById("fno").value;
            let b = document.getElementById("sno").value;
            let c = a-b
            alert("subtraction: " + c);
        }
    </script>
</body>
